name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: MacosWidgetsStatsFromWebsite
  LATEST_ZIP_FILENAME: MacosWidgetsStatsFromWebsite-latest.zip
  SPARKLE_VERSION: 2.6.4
  DEVELOPMENT_TEAM_FALLBACK: T34G959ZG8

jobs:
  release:
    name: Build, notarize, publish
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate checked-in release metadata
        run: python3 scripts/validate_release_metadata.py --check-repo --check-version

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Validate release secrets
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD SPARKLE_ED25519_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ ${#missing[@]} -ne 0 ]; then
            printf '::error title=Missing release secret(s)::%s\n' "${missing[*]}"
            echo '::error::Add the required GitHub Actions secrets documented in docs/release.md before running this workflow.'
            exit 1
          fi

          if [ -z "${APPLE_TEAM_ID:-${DEVELOPMENT_TEAM:-}}" ]; then
            echo "::notice title=Using checked-in Apple team fallback::APPLE_TEAM_ID/DEVELOPMENT_TEAM is not set, so the workflow will use $DEVELOPMENT_TEAM_FALLBACK."
          fi

      - name: Import Developer ID certificate
        id: import-cert
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/stats-widget-from-website-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S "apple-tool:,apple:,codesign:" \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          existing="$(security list-keychains -d user | tr -d '"' | xargs)"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $existing
          security default-keychain -s "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"
          echo "CI_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Prepare release metadata
        id: meta
        run: python3 scripts/prepare_release_metadata.py --apply-plists

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MacosWidgetsStatsFromWebsite.xcodeproj \
            -scheme MacosWidgetsStatsFromWebsite \
            -packageAuthorizationProvider netrc \
            -scmProvider system

      # The app bundles upstream Chromium during the Xcode build via
      # scripts/embed-chromium.sh. That post-build phase fetches any missing
      # or stale vendor/chromium snapshots and re-signs the embedded browser
      # before the archive is exported/notarized.

      - name: Build archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          TEAM_ID="${APPLE_TEAM_ID:-${DEVELOPMENT_TEAM:-$DEVELOPMENT_TEAM_FALLBACK}}"
          xcodebuild archive \
            -project MacosWidgetsStatsFromWebsite.xcodeproj \
            -scheme MacosWidgetsStatsFromWebsite \
            -configuration Release \
            -archivePath build/MacosWidgetsStatsFromWebsite.xcarchive \
            -packageAuthorizationProvider netrc \
            -scmProvider system \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MacosWidgetsStatsFromWebsite.xcarchive \
            -exportOptionsPlist scripts/ExportOptions.plist \
            -exportPath build/Export

      - name: Download Sparkle tools
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p build/sparkle
          gh release download "$SPARKLE_VERSION" \
            --repo sparkle-project/Sparkle \
            --pattern "Sparkle-$SPARKLE_VERSION.tar.xz" \
            --dir build/sparkle
          tar -xf "build/sparkle/Sparkle-$SPARKLE_VERSION.tar.xz" -C build/sparkle
          test -x "build/sparkle/Sparkle-$SPARKLE_VERSION/bin/sign_update"

      - name: Notarize exported app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          TEAM_ID="${APPLE_TEAM_ID:-${DEVELOPMENT_TEAM:-$DEVELOPMENT_TEAM_FALLBACK}}"
          ditto -c -k --keepParent "build/Export/$APP_NAME.app" "build/$APP_NAME-notary.zip"
          xcrun notarytool submit "build/$APP_NAME-notary.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Staple app
        run: |
          xcrun stapler staple "build/Export/$APP_NAME.app"
          xcrun stapler validate "build/Export/$APP_NAME.app"

      - name: Create release ZIPs
        id: package
        run: |
          set -euo pipefail
          ZIP_PATH="build/$ASSET_ZIP_FILENAME"
          LATEST_ZIP_PATH="build/$LATEST_ZIP_FILENAME"
          ditto -c -k --keepParent "build/Export/$APP_NAME.app" "$ZIP_PATH"
          cp "$ZIP_PATH" "$LATEST_ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_filename=$(basename "$ZIP_PATH")" >> "$GITHUB_OUTPUT"
          echo "zip_size=$(stat -f%z "$ZIP_PATH")" >> "$GITHUB_OUTPUT"
          echo "latest_zip_path=$LATEST_ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Sign ZIP with Sparkle
        id: sparkle
        env:
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          ED_SIGNATURE="$(./scripts/sign_update "${{ steps.package.outputs.zip_path }}" "$SPARKLE_ED25519_PRIVATE_KEY")"
          if [ -z "$ED_SIGNATURE" ]; then
            echo "::error::Sparkle sign_update returned an empty signature"
            exit 1
          fi
          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"

      - name: Compose release body
        run: |
          set -euo pipefail
          {
            echo "## $RELEASE_TITLE"
            echo ""
            echo "Signed and notarized macOS release for commit \`$GITHUB_SHA\`."
            echo ""
            echo "### Downloads"
            echo ""
            echo "- Stable latest ZIP: \`$LATEST_ZIP_URL\`"
            echo "- Versioned ZIP: \`$VERSIONED_ZIP_URL\`"
            echo ""
            echo "Existing installs update automatically via Sparkle from:"
            echo "\`https://ethansk.github.io/stats-widget-from-website/appcast.xml\`"
            echo ""
            echo "Workflow run: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo ""
            echo "Release channel: \`$RELEASE_CHANNEL\`"
          } > build/release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.RELEASE_TITLE }}
          body_path: build/release-notes.md
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.latest_zip_path }}
          prerelease: false
          make_latest: true

      - name: Update gh-pages appcast
        env:
          ED_SIGNATURE: ${{ steps.sparkle.outputs.ed_signature }}
          ZIP_FILENAME: ${{ steps.package.outputs.zip_filename }}
          ZIP_SIZE: ${{ steps.package.outputs.zip_size }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          GH_PAGES_DIR="$RUNNER_TEMP/gh-pages"

          git fetch origin gh-pages:refs/remotes/origin/gh-pages
          git worktree add -B gh-pages "$GH_PAGES_DIR" origin/gh-pages

          APPCAST_PATH="$GH_PAGES_DIR/appcast.xml" \
          VERSION="$RELEASE_VERSION" \
          DISPLAY_VERSION="$RELEASE_DISPLAY_VERSION" \
          BUILD_NUMBER="$RELEASE_BUILD_NUMBER" \
          RELEASE_TAG="$RELEASE_TAG" \
          ZIP_FILENAME="$ZIP_FILENAME" \
          ZIP_SIZE="$ZIP_SIZE" \
          ED_SIGNATURE="$ED_SIGNATURE" \
          REPO="$REPO" \
          RELEASE_NOTES_URL="$RELEASE_NOTES_URL" \
            python3 scripts/update_appcast.py

          # Refresh version.json (consumed by the landing page's dynamic
          # version badge). Keep the schema in sync with site/version.json
          # on gh-pages — index.html's loader expects { version, channel,
          # release_url, appcast_url, download_url } keys.
          VERSION_JSON_VERSION="$RELEASE_VERSION" \
          VERSION_JSON_REPO="$REPO" \
          VERSION_JSON_LATEST_ZIP="$LATEST_ZIP_FILENAME" \
          VERSION_JSON_GH_PAGES_DIR="$GH_PAGES_DIR" \
            python3 - <<'PY'
import json, os, datetime
repo = os.environ["VERSION_JSON_REPO"]
slug = repo.split("/", 1)[1]
data = {
    "version": os.environ["VERSION_JSON_VERSION"],
    "channel": "stable",
    "updated_at": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
    "release_url": f"https://github.com/{repo}/releases/latest",
    "appcast_url": f"https://ethansk.github.io/{slug}/appcast.xml",
    "download_url": f"https://github.com/{repo}/releases/latest/download/{os.environ['VERSION_JSON_LATEST_ZIP']}",
}
out = os.path.join(os.environ["VERSION_JSON_GH_PAGES_DIR"], "version.json")
with open(out, "w") as f:
    json.dump(data, f, indent=2)
    f.write("\n")
print("wrote", out, data)
PY

          python3 scripts/validate_release_metadata.py \
            --site-dir "$GH_PAGES_DIR" \
            --check-site \
            --check-appcast \
            --require-appcast-item

          echo "GH_PAGES_DIR=$GH_PAGES_DIR" >> "$GITHUB_ENV"
          git -C "$GH_PAGES_DIR" diff -- appcast.xml version.json

      - name: Commit appcast + version.json to gh-pages
        run: |
          set -euo pipefail
          git -C "$GH_PAGES_DIR" config user.name "github-actions[bot]"
          git -C "$GH_PAGES_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$GH_PAGES_DIR" add appcast.xml version.json

          if git -C "$GH_PAGES_DIR" diff --cached --quiet; then
            echo "No appcast/version changes to commit"
            exit 0
          fi

          git -C "$GH_PAGES_DIR" commit -m "chore: update appcast + version.json for ${RELEASE_TAG}"
          git -C "$GH_PAGES_DIR" push origin HEAD:gh-pages

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${CI_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$CI_KEYCHAIN_PATH" || true
          fi
