name: Release

on:
  # Tag-only release trigger — aligns with bump-and-tag.sh as THE explicit
  # release ceremony. Branch pushes (e.g. doc fixes, lint cleanups, README
  # tweaks landing on main) no longer publish a release. This eliminates
  # the "every commit auto-publishes a build-tagged release" noise that the
  # branch+tag combo produced, and removes the branch-vs-tag race at the
  # source. The `check-tag-race` guard job below stays as defense-in-depth
  # for workflow_dispatch + tag combinations and any future regression that
  # re-adds branch triggers. Established 2026-05-24 (MBP-CC bridge
  # msg-3db7c68a, voice 3991 follow-up).
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # User-facing .app wrapper name. Internal executable + build product
  # stay "MacosWidgetsStatsFromWebsite" — xcodebuild outputs
  # MacosWidgetsStatsFromWebsite.app from build/Export/, and we rename
  # the wrapper directory to "Stats Widget from Website.app" after
  # exportArchive (see "Rename exported .app wrapper" step). All
  # downstream notarize/staple/zip/sparkle steps then reference the
  # renamed wrapper via $APP_NAME with quotes for the embedded spaces.
  # v0.21.22, voice 4002 / MBP-CC bridge msg-65036391.
  APP_NAME: Stats Widget from Website
  # ZIP filename uses URL-safe hyphens — spaces would percent-encode in
  # the Sparkle enclosure URL and break some download clients. Note
  # validate_release_metadata.py + update_appcast.py both check for the
  # new "Stats-Widget-from-Website" token, NOT the old internal name.
  LATEST_ZIP_FILENAME: Stats-Widget-from-Website-latest.zip
  # The exported .xcarchive's Products/Applications subdirectory still
  # uses the internal build product name — that's what xcodebuild emits
  # before our rename ceremony. Used by the rename step and notarize
  # validation only.
  EXPORTED_APP_FILENAME: MacosWidgetsStatsFromWebsite.app
  SPARKLE_VERSION: 2.6.4
  DEVELOPMENT_TEAM_FALLBACK: T34G959ZG8

jobs:
  # HIGH 1 — double-trigger race guard (Codex xhigh review, voice 3991).
  #
  # Problem: this workflow fires on BOTH `push: branches: main` AND
  # `push: tags: v*`. scripts/bump-and-tag.sh's "push branch then push tag"
  # therefore queues TWO release jobs that race on the same GitHub Release
  # asset upload and gh-pages appcast commit. Worse, on the branch run
  # scripts/prepare_release_metadata.py (line 94) PUBLISHES the canonical
  # `v<version>` tag when it is still missing — which is exactly the tag
  # the second run would otherwise have used as its trigger. Both runs end
  # up pointing at the same SHA + same tag, then collide.
  #
  # Fix: if THIS event is a branch push AND some `v*` tag already points
  # at the same SHA, the tag-push run is the canonical release. Exit
  # success early so the branch-push run no-ops and the tag-push run
  # handles the release alone.
  #
  # Fail-soft: any API hiccup in the lookup MUST NOT block the workflow,
  # because the branch run can legitimately need to proceed (e.g. first
  # release on a fresh main where the canonical tag has not been created
  # yet — that is the path that DOES want to publish the canonical tag).
  # On API error we log a warning and let `release` proceed.
  #
  # Security note: the github-script step only reads context.sha (a 40-char
  # SHA produced by GitHub itself) — no untrusted free-form input from
  # commit messages, PR titles, etc. Safe by construction.
  check-tag-race:
    name: Skip if a tag push is racing this branch push
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.detect.outputs.should_skip }}
    steps:
      - name: Detect concurrent v* tag at same SHA
        id: detect
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        uses: actions/github-script@v7
        with:
          # FINDING 2 follow-up (Codex re-review of 09ee493, voice 3991):
          # the single-snapshot version of this check raced against
          # bump-and-tag.sh's "push branch THEN push tag" sequence — the
          # branch-triggered workflow could reach this check before the
          # tag push hit GitHub, see no tag, set should_skip=false, and
          # publish a duplicate release. Fix: poll with bounded retries.
          # We wait UP TO ~30s total for the tag to appear, then proceed
          # if it still doesn't. 30s is comfortably longer than the
          # typical bump-and-tag.sh tag-push latency (sub-second on a
          # healthy network) but short enough that a genuine "branch
          # push without subsequent tag push" path (e.g. a regular
          # non-release commit to main, or a re-merged feature branch)
          # is not unduly delayed. Workflow_dispatch and direct tag
          # pushes skip this check entirely (the outer `if` guards on
          # branch pushes only).
          script: |
            const sha = context.sha;
            const maxAttempts = 6;          // 6 attempts ≈ 30s total
            const delayMs = 5000;           // 5s between attempts
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));
            core.info(`Checking for v* tags pointing at ${sha} (up to ${maxAttempts} attempts)...`);
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                // Paginate "tags/v" prefix-match refs and look for one
                // whose object.sha equals the current commit. Cheap on
                // repos with O(100s) of tags; we'd need to rethink for
                // O(10k+) tags but that's not in the cards here.
                const refs = await github.paginate(
                  github.rest.git.listMatchingRefs,
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: 'tags/v',
                    per_page: 100,
                  }
                );
                const matchingTag = refs.find(r => r.object && r.object.sha === sha);
                if (matchingTag) {
                  core.notice(
                    `Skipping branch-push release run: tag ${matchingTag.ref} ` +
                    `already points at ${sha} (attempt ${attempt}/${maxAttempts}). ` +
                    `The tag-push run will publish.`
                  );
                  core.setOutput('should_skip', 'true');
                  return;
                }
                if (attempt < maxAttempts) {
                  core.info(
                    `No v* tag at ${sha} yet (attempt ${attempt}/${maxAttempts}); ` +
                    `waiting ${delayMs / 1000}s before retry...`
                  );
                  await sleep(delayMs);
                }
              } catch (err) {
                // Fail-soft per Codex finding — do not break the build
                // on an API hiccup. Log + proceed.
                core.warning(
                  `Tag-race check failed on attempt ${attempt}/${maxAttempts} ` +
                  `(${err.message}); proceeding with release. ` +
                  `If two runs race, the later one will overwrite the gh-pages appcast.`
                );
                core.setOutput('should_skip', 'false');
                return;
              }
            }
            // Exhausted all attempts without finding a matching tag.
            // This is the legitimate "real branch push, no concurrent
            // tag push" path — proceed with the release.
            core.info(
              `No v* tag at ${sha} after ${maxAttempts} attempts; ` +
              `proceeding with branch-push release.`
            );
            core.setOutput('should_skip', 'false');

  release:
    name: Build, notarize, publish
    needs: check-tag-race
    if: needs.check-tag-race.outputs.should_skip != 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate checked-in release metadata
        run: python3 scripts/validate_release_metadata.py --check-repo --check-version

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Validate release secrets
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD SPARKLE_ED25519_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ ${#missing[@]} -ne 0 ]; then
            printf '::error title=Missing release secret(s)::%s\n' "${missing[*]}"
            echo '::error::Add the required GitHub Actions secrets documented in docs/release.md before running this workflow.'
            exit 1
          fi

          if [ -z "${APPLE_TEAM_ID:-${DEVELOPMENT_TEAM:-}}" ]; then
            echo "::notice title=Using checked-in Apple team fallback::APPLE_TEAM_ID/DEVELOPMENT_TEAM is not set, so the workflow will use $DEVELOPMENT_TEAM_FALLBACK."
          fi

      - name: Import Developer ID certificate
        id: import-cert
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/stats-widget-from-website-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S "apple-tool:,apple:,codesign:" \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          existing="$(security list-keychains -d user | tr -d '"' | xargs)"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $existing
          security default-keychain -s "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"
          echo "CI_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Prepare release metadata
        id: meta
        run: python3 scripts/prepare_release_metadata.py --apply-plists

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MacosWidgetsStatsFromWebsite.xcodeproj \
            -scheme MacosWidgetsStatsFromWebsite \
            -packageAuthorizationProvider netrc \
            -scmProvider system

      # The app bundles upstream Chromium during the Xcode build via
      # scripts/embed-chromium.sh. That post-build phase fetches any missing
      # or stale vendor/chromium snapshots and re-signs the embedded browser
      # before the archive is exported/notarized.

      - name: Build archive (ad-hoc signed)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          TEAM_ID="${APPLE_TEAM_ID:-${DEVELOPMENT_TEAM:-$DEVELOPMENT_TEAM_FALLBACK}}"
          # v0.21.22 (voice 4002 / MBP-CC bridge msg-65036391): archive
          # runs with CODE_SIGN_IDENTITY="-" (ad-hoc) — see project.yml's
          # configs.Release block for the full rationale. The Developer ID
          # signature is applied by scripts/sign-release.sh in the next
          # step, which deep-walks the .app and signs each nested bundle
          # (widget extension, Sparkle, Chromium, outer .app) with the
          # correct per-bundle entitlements.
          xcodebuild archive \
            -project MacosWidgetsStatsFromWebsite.xcodeproj \
            -scheme MacosWidgetsStatsFromWebsite \
            -configuration Release \
            -archivePath build/MacosWidgetsStatsFromWebsite.xcarchive \
            -packageAuthorizationProvider netrc \
            -scmProvider system \
            DEVELOPMENT_TEAM="$TEAM_ID"

      # Walk the archived .app inside-out and re-sign every nested bundle
      # (widget extension with its own sandbox-enabled entitlements;
      # Sparkle XPCs / Autoupdate / Updater.app; embedded Chromium tree;
      # outer .app last with the main-app entitlements) using the imported
      # Developer ID Application identity. See the script's header for
      # the full rationale. v0.21.22.
      - name: Deep-sign archive with Developer ID
        run: |
          set -euo pipefail
          ./scripts/sign-release.sh build/MacosWidgetsStatsFromWebsite.xcarchive

      # Copy the deep-signed .app out of the archive into build/Export/
      # and rename the wrapper directory to the user-facing name
      # ("Stats Widget from Website.app"). We deliberately do NOT use
      # xcodebuild -exportArchive — that would try to redo signing with
      # the ExportOptions.plist, and any mismatch between our post-archive
      # deep-sign and xcodebuild's re-sign attempt produces a broken
      # bundle. The .app inside the .xcarchive is already a complete,
      # properly-signed product. v0.21.22, voice 4002 / MBP-CC bridge
      # msg-65036391.
      - name: Copy + rename .app for distribution
        run: |
          set -euo pipefail
          mkdir -p build/Export
          SOURCE="build/MacosWidgetsStatsFromWebsite.xcarchive/Products/Applications/$EXPORTED_APP_FILENAME"
          DEST="build/Export/$APP_NAME.app"
          if [ ! -d "$SOURCE" ]; then
            echo "::error::Expected signed .app at $SOURCE; archive step did not produce it."
            ls -la build/MacosWidgetsStatsFromWebsite.xcarchive/Products/Applications/ || true
            exit 1
          fi
          # ditto preserves extended attributes + signatures.
          ditto "$SOURCE" "$DEST"
          # Internal executable name MUST NOT change — only the wrapper
          # directory's filename changes. The executable inside
          # Contents/MacOS/ stays "MacosWidgetsStatsFromWebsite" so the
          # LaunchAgent + CLI fallback resolver keep working.
          if [ ! -x "$DEST/Contents/MacOS/MacosWidgetsStatsFromWebsite" ]; then
            echo "::error::Renamed .app is missing internal executable Contents/MacOS/MacosWidgetsStatsFromWebsite"
            ls -la "$DEST/Contents/MacOS/" || true
            exit 1
          fi
          # Re-verify signature after the copy — ditto preserves the
          # signature but the renamed wrapper has a different parent path,
          # so the seal check has to pass on the final filesystem path.
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$DEST"
          echo "Copied + renamed $SOURCE -> $DEST"

      - name: Download Sparkle tools
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          mkdir -p build/sparkle
          # Use curl + the public release URL. We previously used
          # `gh release download` which failed silently in CI with exit
          # code 1 and no stderr — likely a rate-limit or auth-scope
          # issue with the github.token against another org's repo.
          # curl is unauthenticated by default and doesn't need any
          # special scope to hit a public release asset.
          #
          # Sparkle's tarball extracts FLAT into the destination dir
          # (bin/, Sparkle.framework/, Sparkle Test App.app/, etc. all
          # at the root level — there is NO Sparkle-$VERSION/ wrapper
          # directory inside). So the post-extract path is
          # build/sparkle/bin/sign_update, not
          # build/sparkle/Sparkle-$VERSION/bin/sign_update which is the
          # original assumption that's been failing CI for months.
          # v0.21.24, voice 4002 follow-up.
          curl -fLsS -o "build/sparkle/Sparkle-$SPARKLE_VERSION.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-$SPARKLE_VERSION.tar.xz"
          tar -xf "build/sparkle/Sparkle-$SPARKLE_VERSION.tar.xz" -C build/sparkle
          test -x "build/sparkle/bin/sign_update"

      - name: Notarize exported app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          # Resolve team ID with malformed-secret robustness. v0.21.26
          # found the APPLE_TEAM_ID secret was 1 character — likely
          # accidentally set to a single asterisk or something while
          # debugging. Apple team IDs are exactly 10 characters
          # (alphanumeric). Fall back through the chain skipping any
          # candidate that fails the length check.
          # v0.21.26, voice 4002 follow-up.
          resolve_team_id() {
              local value="$1"
              # Trim leading/trailing whitespace.
              value="${value#"${value%%[![:space:]]*}"}"
              value="${value%"${value##*[![:space:]]}"}"
              # Apple team IDs are exactly 10 chars. Anything else is
              # almost certainly garbage / a placeholder.
              if [ ${#value} -eq 10 ]; then
                  printf '%s' "$value"
                  return 0
              fi
              return 1
          }
          TEAM_ID="$(resolve_team_id "$APPLE_TEAM_ID" || \
                      resolve_team_id "$DEVELOPMENT_TEAM" || \
                      resolve_team_id "$DEVELOPMENT_TEAM_FALLBACK")"
          echo "Resolved TEAM_ID length: ${#TEAM_ID}"
          if [ ${#TEAM_ID} -ne 10 ]; then
            echo "::error::Resolved TEAM_ID is not exactly 10 chars (${#TEAM_ID}). Check APPLE_TEAM_ID secret."
            exit 1
          fi
          ditto -c -k --keepParent "build/Export/$APP_NAME.app" "build/$APP_NAME-notary.zip"
          xcrun notarytool submit "build/$APP_NAME-notary.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Staple app
        run: |
          set -euo pipefail

          # Apple can report a notarization as Accepted before the stapling
          # ticket is visible through the CloudKit lookup that `stapler`
          # performs. v0.21.30 proved that race: notarytool accepted the
          # upload, then an immediate stapler call failed with
          # "Record not found". Retry with a short bounded backoff so a
          # transient ticket-propagation lag does not abort an otherwise
          # valid release.
          for attempt in {1..10}; do
            if xcrun stapler staple "build/Export/$APP_NAME.app"; then
              break
            fi

            if [ "$attempt" -eq 10 ]; then
              echo "::error::Stapling failed after $attempt attempts."
              exit 65
            fi

            sleep_seconds=$((attempt * 15))
            echo "Stapling ticket not visible yet; retrying in ${sleep_seconds}s (attempt ${attempt}/10)."
            sleep "$sleep_seconds"
          done

          xcrun stapler validate "build/Export/$APP_NAME.app"

      - name: Create release ZIPs
        id: package
        run: |
          set -euo pipefail
          ZIP_PATH="build/$ASSET_ZIP_FILENAME"
          LATEST_ZIP_PATH="build/$LATEST_ZIP_FILENAME"
          ditto -c -k --keepParent "build/Export/$APP_NAME.app" "$ZIP_PATH"
          cp "$ZIP_PATH" "$LATEST_ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_filename=$(basename "$ZIP_PATH")" >> "$GITHUB_OUTPUT"
          echo "zip_size=$(stat -f%z "$ZIP_PATH")" >> "$GITHUB_OUTPUT"
          echo "latest_zip_path=$LATEST_ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Sign ZIP with Sparkle
        id: sparkle
        env:
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          ED_SIGNATURE="$(./scripts/sign_update "${{ steps.package.outputs.zip_path }}" "$SPARKLE_ED25519_PRIVATE_KEY")"
          if [ -z "$ED_SIGNATURE" ]; then
            echo "::error::Sparkle sign_update returned an empty signature"
            exit 1
          fi
          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"

      - name: Compose release body
        run: |
          set -euo pipefail
          {
            echo "## $RELEASE_TITLE"
            echo ""
            echo "Signed and notarized macOS release for commit \`$GITHUB_SHA\`."
            echo ""
            echo "### Downloads"
            echo ""
            echo "- Stable latest ZIP: \`$LATEST_ZIP_URL\`"
            echo "- Versioned ZIP: \`$VERSIONED_ZIP_URL\`"
            echo ""
            echo "Existing installs update automatically via Sparkle from:"
            echo "\`https://ethansk.github.io/stats-widget-from-website/appcast.xml\`"
            echo ""
            echo "Workflow run: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo ""
            echo "Release channel: \`$RELEASE_CHANNEL\`"
          } > build/release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.RELEASE_TITLE }}
          body_path: build/release-notes.md
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.latest_zip_path }}
          prerelease: false
          make_latest: true

      - name: Update gh-pages appcast
        env:
          ED_SIGNATURE: ${{ steps.sparkle.outputs.ed_signature }}
          ZIP_FILENAME: ${{ steps.package.outputs.zip_filename }}
          ZIP_SIZE: ${{ steps.package.outputs.zip_size }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          GH_PAGES_DIR="$RUNNER_TEMP/gh-pages"

          git fetch origin gh-pages:refs/remotes/origin/gh-pages
          git worktree add -B gh-pages "$GH_PAGES_DIR" origin/gh-pages

          APPCAST_PATH="$GH_PAGES_DIR/appcast.xml" \
          VERSION="$RELEASE_VERSION" \
          DISPLAY_VERSION="$RELEASE_DISPLAY_VERSION" \
          BUILD_NUMBER="$RELEASE_BUILD_NUMBER" \
          RELEASE_TAG="$RELEASE_TAG" \
          ZIP_FILENAME="$ZIP_FILENAME" \
          ZIP_SIZE="$ZIP_SIZE" \
          ED_SIGNATURE="$ED_SIGNATURE" \
          REPO="$REPO" \
          RELEASE_NOTES_URL="$RELEASE_NOTES_URL" \
            python3 scripts/update_appcast.py

          # Refresh version.json (consumed by the landing page's dynamic
          # version badge). Keep the schema in sync with site/version.json
          # on gh-pages — index.html's loader expects { version, channel,
          # release_url, appcast_url, download_url } keys.
          python3 scripts/write_version_json.py "$GH_PAGES_DIR/version.json"

          python3 scripts/validate_release_metadata.py \
            --site-dir "$GH_PAGES_DIR" \
            --check-site \
            --check-appcast \
            --require-appcast-item

          echo "GH_PAGES_DIR=$GH_PAGES_DIR" >> "$GITHUB_ENV"
          git -C "$GH_PAGES_DIR" diff -- appcast.xml version.json

      - name: Commit appcast + version.json to gh-pages
        run: |
          set -euo pipefail
          git -C "$GH_PAGES_DIR" config user.name "github-actions[bot]"
          git -C "$GH_PAGES_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$GH_PAGES_DIR" add appcast.xml version.json

          if git -C "$GH_PAGES_DIR" diff --cached --quiet; then
            echo "No appcast/version changes to commit"
            exit 0
          fi

          git -C "$GH_PAGES_DIR" commit -m "chore: update appcast + version.json for ${RELEASE_TAG}"
          git -C "$GH_PAGES_DIR" push origin HEAD:gh-pages

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${CI_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$CI_KEYCHAIN_PATH" || true
          fi
