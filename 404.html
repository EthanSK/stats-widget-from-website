<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not found · Stats Widget from Website</title>
    <link rel="stylesheet" href="/stats-widget-from-website/styles.css" />
    <style>
      .nf {
        min-height: 100vh;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; text-align: center; padding: 0 24px;
        position: relative; z-index: 2;
      }
      .nf-code {
        font-family: var(--font-rounded);
        font-size: clamp(120px, 22vw, 240px);
        font-weight: 700;
        letter-spacing: -0.05em;
        line-height: 1;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .nf-msg {
        font-family: var(--font-display);
        font-size: clamp(1.4rem, 3vw, 2rem);
        font-weight: 600;
        letter-spacing: -0.025em;
      }
      .nf-tag {
        color: var(--muted);
        max-width: 460px;
      }
    </style>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="ambient" aria-hidden="true"></div>
    <main class="nf">
      <div class="nf-code">404</div>
      <div class="nf-msg">No tracker by that path.</div>
      <p class="nf-tag">The page you're looking for never existed, was renamed, or got self-healed away. Try the <a href="/stats-widget-from-website/">homepage</a> instead.</p>
    </main>
  </body>
</html>
