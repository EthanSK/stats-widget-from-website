name: MacosWidgetsStatsFromWebsite

options:
  minimumXcodeGenVersion: 2.39.0
  createIntermediateGroups: true
  postGenCommand: python3 scripts/ensure-xcode-app-groups-capability.py
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: T34G959ZG8
    # Global default — Debug builds inherit Automatic so local Xcode runs use
    # the developer's logged-in Apple ID. The Release config on each
    # distributable target (main app + widget extension) overrides this to
    # Manual Developer ID signing for the Sparkle distribution channel —
    # see configs.Release blocks on each target below.
    #
    # Why manual for Release (v0.21.22, voice 4002, MBP-CC bridge
    # msg-65036391):
    #   v0.21.21 release.yml run failed at "Build archive" with
    #   "Mac Development cert required for the widget extension" because
    #   Xcode's auto-signing fallback inside the CI keychain has no Apple ID
    #   logged in to resolve a provisioning profile, and on a Developer-ID
    #   distribution flow there IS no Mac Development cert to fall back on.
    #   Manual Developer ID signing fixes this — the imported P12 in the CI
    #   keychain is the single source of identity for both the app and the
    #   embedded widget extension. Sparkle distribution is NOT App Store, so
    #   we don't use provisioning profiles (no PROVISIONING_PROFILE_SPECIFIER
    #   key anywhere — Developer ID distribution is profile-free).
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGNING_ALLOWED: YES
    # ---------------------------------------------------------------------
    # Apple Silicon only — no x86_64 / universal builds.
    #
    # Why (Ethan voice 6942, 2026-05-23):
    #   Release builds were failing to ship because the bundled upstream
    #   Chromium ships a mac-x64 subcomponent (see scripts/embed-chromium.sh
    #   + vendor/chromium/mac-x64/...) that is NOT signed with our team's
    #   Developer ID and cannot be re-signed cleanly during the post-build
    #   Embed Chromium phase. As long as ARCHS included x86_64 the build
    #   pipeline tried to assemble a universal .app containing both
    #   mac-arm64 and mac-x64 Chromium payloads, and codesign rejected the
    #   x64 Chromium binary every time.
    #
    # Why arm64-only is fine:
    #   - The widget extension target already deploys to macOS 14, which on
    #     macOS 14+ effectively means Apple Silicon only (Intel Macs ran out
    #     of macOS feature parity at Sonoma 14).
    #   - The user-facing audience is Apple Silicon: Ethan's Mac mini + MBP
    #     fleet, and anyone on macOS 13+ who buys the app — Intel Macs are
    #     not the target.
    #   - Dropping x86_64 also halves the Chromium payload size in every
    #     .app (no more mac-x64/Chromium.app inside Resources/Browsers).
    #
    # ARCHS=arm64 forces Xcode to skip the x86_64 slice entirely so the
    # embed-chromium.sh script also skips the mac-x64 vendor directory
    # (see its normalize-arches loop). EXCLUDED_ARCHS=x86_64 is a belt-
    # and-braces guard in case any sub-target inherits a default that
    # would re-introduce x86_64 (Sparkle's SPM packages, for example).
    #
    # If we ever need universal again, restore both lines to ONLY_ACTIVE_ARCH
    # behaviour and re-test the Embed Chromium codesign step end-to-end —
    # do NOT just delete these lines silently.
    # ---------------------------------------------------------------------
    ARCHS: arm64
    EXCLUDED_ARCHS: x86_64
    ONLY_ACTIVE_ARCH: NO
    # Single source of truth for the marketing version + CFBundleVersion build
    # number. All targets inherit these via the per-target info.properties
    # blocks below (CFBundleShortVersionString: $(MARKETING_VERSION),
    # CFBundleVersion: $(CURRENT_PROJECT_VERSION)). To bump the version, edit
    # ONLY these two values — the Swift binaries read CFBundleShortVersionString
    # from Bundle.main.infoDictionary at runtime, so nothing else needs touching.
    # Enforced by .githooks/pre-commit (see core.hooksPath in repo config) and
    # by scripts/validate_release_metadata.py.
    MARKETING_VERSION: "0.21.38"
    CURRENT_PROJECT_VERSION: "1294"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.0

targets:
  MacosWidgetsStatsFromWebsite:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    productName: MacosWidgetsStatsFromWebsite
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups:
          enabled: 1
    sources:
      - path: MacosWidgetsStatsFromWebsite/Apps/MainApp
        excludes:
          - Resources
      # Auto-repair hook script + future bundled helpers. Added as a
      # folder reference so the inner Scripts/ directory shape is
      # preserved at Contents/Resources/Scripts/auto-repair-tracker.sh
      # (HookScriptPaths.swift relies on that exact layout).
      - path: MacosWidgetsStatsFromWebsite/Apps/MainApp/Resources/Scripts
        buildPhase: resources
        type: folder
      - path: MacosWidgetsStatsFromWebsite/Shared
    dependencies:
      - target: MacosWidgetsStatsFromWebsiteWidget
        embed: true
        codeSign: true
      - package: Sparkle
        product: Sparkle
    # Bundle upstream Chromium inside the .app (0.14.0+).
    #
    # Background: the 0.13.x lazy-download path (download → extract to
    # <Container>/Data/Library/Application Support → exec) is fundamentally
    # broken under App Sandbox. macOS auto-re-attaches `com.apple.quarantine`
    # when the sandboxed app touches the extracted binary, and the sandbox
    # itself denies execve from container-relative paths regardless of POSIX
    # perms / xattr state. The 0.13.4 removexattr-syscall fix did not (and
    # could not) solve this — confirmed empirically on Ethan's MBP install
    # 2026-05-11: Chromium binary was 0755 + valid Mach-O + manually
    # quarantine-stripped, AND `Chromium --version` worked from shell, BUT
    # the sandboxed app's `isExecutableFile(atPath:)` still returned false
    # because the OS re-attached quarantine the moment the app touched the
    # file.
    #
    # The only path that reliably works under sandbox is bundling Chromium
    # inside the .app — sandboxed apps CAN exec binaries from their own
    # bundle (this is what v0.13.0 did for CFT, before CFT was rejected for
    # blocking Google sign-in). Upstream Chromium does not inject the
    # automation markers that CFT does, so it can sign into Google AND it
    # runs from inside our sandbox.
    #
    # See scripts/embed-chromium.sh for the full rationale.
    postBuildScripts:
      - name: Embed Chromium
        # Double-quote PROJECT_DIR in the shell line so checkout paths
        # containing spaces (e.g. "~/My Projects/...") don't split the
        # command. Xcode runs the shellScript value verbatim through
        # /bin/sh — YAML quotes here only affect parsing, not the
        # resulting shell line.
        script: '"${PROJECT_DIR}/scripts/embed-chromium.sh"'
        # No declared inputs/outputs: the script does its own up-to-date
        # check via Chromium revision marker + signature-team comparison,
        # so an "unchanged" build is cheap.
        runOnlyWhenInstalling: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethansk.macos-widgets-stats-from-website
        INFOPLIST_FILE: MacosWidgetsStatsFromWebsite/Apps/MainApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Debug uses an unsandboxed entitlements file to avoid the macOS
        # Sonoma+ kTCCServiceSystemPolicyAppData prompt ("would like to
        # access data from other apps") re-firing on every rebuild. The
        # release sandbox is unchanged.
        Debug:
          CODE_SIGN_ENTITLEMENTS: MacosWidgetsStatsFromWebsite/Apps/MainApp/MacosWidgetsStatsFromWebsite.Debug.entitlements
          # Xcode's Debug Dylib launcher can start this SwiftUI macOS app
          # windowless under UI automation / manual smoke runs. Keep Debug as a
          # normal app binary so first-launch and browser-flow tests exercise the
          # real window lifecycle.
          ENABLE_DEBUG_DYLIB: NO
        Release:
          CODE_SIGN_ENTITLEMENTS: MacosWidgetsStatsFromWebsite/Apps/MainApp/MacosWidgetsStatsFromWebsite.entitlements
          # Archive-then-resign pattern (v0.21.22, voice 4002 / MBP-CC
          # bridge msg-65036391). The Release archive is built with the
          # ad-hoc identity ("-"); the post-archive resign pass in
          # scripts/sign-release.sh walks the .app inside-out and applies
          # the real "Developer ID Application" identity with each
          # nested bundle's own entitlements (widget extension keeps its
          # sandbox-enabled entitlements, Sparkle XPCs keep theirs,
          # embedded Chromium keeps its inherited team identity).
          #
          # Why we can't use a single xcodebuild signing pass:
          #   1. Manual + Developer ID Application fails archive because
          #      the App Groups + keychain-access-groups entitlements
          #      legitimately require a provisioning profile under
          #      Xcode 16+, and Developer ID distribution is
          #      profile-free.
          #   2. Automatic + Developer ID Application is an explicit
          #      Xcode conflict ("conflicting code signing identity
          #      Developer ID Application has been manually specified").
          #   3. Automatic on its own (Apple Development cert) fails
          #      under CI because the keychain has no logged-in Apple
          #      ID, and on a Developer-ID-only signing keychain the
          #      Mac Development cert doesn't exist (this is the
          #      v0.21.21 failure that motivated the whole rename).
          #
          # Debug intentionally stays Automatic so local Xcode runs
          # work with the developer's logged-in Apple ID without
          # manual cert management.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: T34G959ZG8
    info:
      path: MacosWidgetsStatsFromWebsite/Apps/MainApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: Stats Widget from Website
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        # v0.21.36 (voice 4189) — explicit user-facing CFBundleName.
        # Pre-v0.21.36 this was `$(PRODUCT_NAME)` which expanded to
        # `MacosWidgetsStatsFromWebsite` (the legacy Swift product
        # name, retained internally for symbol stability). macOS's
        # widget picker UI (Finder Edit Widgets → search) groups
        # widgets under the PARENT app's CFBundleName, falling back to
        # CFBundleDisplayName ONLY when CFBundleName is absent. With
        # CFBundleName=MacosWidgetsStatsFromWebsite the picker showed
        # the legacy identifier as the section header even though
        # CFBundleDisplayName was already "Stats Widget from Website".
        # Setting CFBundleName explicitly here overrides
        # $(PRODUCT_NAME) without changing the actual Xcode product
        # name (which would invalidate Sparkle / app group / bundle ID
        # contracts). The Mach-O binary name + .app wrapper name are
        # unrelated to CFBundleName so this is a UX-only flip.
        CFBundleName: Stats Widget from Website
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDocumentTypes:
          - CFBundleTypeName: Stats Widget from Website Selector Pack
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.ethansk.macos-widgets-stats-from-website.selectorpack
        CFBundleURLTypes:
          - CFBundleURLName: MacosWidgetsStatsFromWebsite
            CFBundleURLSchemes:
              - macos-widgets-stats-from-website
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        # v0.21.32 — hybrid UX: LSUIElement=false makes this a normal
        # Mac app (Dock icon visible, auto-opens prefs window on launch,
        # Cmd-Tab discoverable). The MenuBarController NSStatusItem
        # stays installed alongside the Dock icon — same pattern as
        # Bartender / Time Out / iStat Menus.
        #
        # Why flipping LSUIElement off doesn't hurt the widget budget:
        # the chronod ~40-70 timeline reloads/day budget for non-
        # foreground apps applies the same to Dock-visible-background
        # apps as it does to LSUIElement agents. What gets us the
        # widget budget benefit is (a) host-process longevity (host
        # stays alive via the host-watchdog LaunchAgent's KeepAlive)
        # and (b) the 30 min scrape cadence in BackgroundScheduler.
        # Neither depends on LSUIElement. See LEARNINGS.md v0.21.32
        # entry. The xcodegen-merged Info.plist takes precedence over
        # the raw source Info.plist, so this is the SOURCE OF TRUTH —
        # don't add LSUIElement back here.
        #
        # NOTE: this key is intentionally OMITTED from the merged
        # Info.plist (rather than set to false) so the absence is
        # semantically equivalent to "no, this app is NOT a menu-bar
        # agent" — LSUIElement defaults to false when absent, but
        # being explicit avoids any future xcodegen merge weirdness.
        LSUIElement: false
        NSPrincipalClass: NSApplication
        SUEnableAutomaticChecks: true
        SUFeedURL: https://ethansk.github.io/stats-widget-from-website/appcast.xml
        # Sparkle ed25519 public key — paired with the SPARKLE_ED25519_PRIVATE_KEY
        # secret on EthanSK/stats-widget-from-website. ROTATED 2026-05-24 by
        # Mini-OC clawdiboi2 (voice 3993): old private key was unrecoverable from
        # Keychain (search of label `https://sparkle-project.org` found only an
        # obscene-sparkle item, no stats-widget entry). New keypair generated via
        # `sign_update --generate-keys` and validated against a dummy ZIP.
        # OLD: 9PG32PH1UFbECc644qjE4OQtpiILuiPCOUuXvgND2tA=
        # NEW: DsTmWIla2YPOmLzMXodwnKdHA25Nca5XBa35mrDzilo=
        # Side-effect: the v0.21.14 SCP-installed builds on Ethan's MBP/Mini have
        # the OLD public key embedded — they will NOT trust Sparkle signatures
        # made with the new private key. First v0.21.19+ install is a one-time
        # manual swap; subsequent versions auto-update normally via Sparkle.
        SUPublicEDKey: DsTmWIla2YPOmLzMXodwnKdHA25Nca5XBa35mrDzilo=
        SUScheduledCheckInterval: 86400
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.ethansk.macos-widgets-stats-from-website.selectorpack
            UTTypeDescription: Stats Widget from Website Selector Pack
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - selectorpack
              public.mime-type:
                - application/vnd.macos-widgets-stats-from-website.selectorpack+json
    # NOTE: No `entitlements:` block here — it would auto-generate the
    # entitlements plist AND force CODE_SIGN_ENTITLEMENTS at the target
    # level, defeating the per-config override above. The Debug and
    # Release entitlements files are maintained on disk directly so the
    # configs.Debug / configs.Release CODE_SIGN_ENTITLEMENTS settings
    # actually take effect.

  MacosWidgetsStatsFromWebsiteWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    productName: MacosWidgetsStatsFromWebsiteWidget
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups:
          enabled: 1
    sources:
      - path: MacosWidgetsStatsFromWebsite/Apps/WidgetExtension
      - path: MacosWidgetsStatsFromWebsite/Shared
        excludes:
          - MCP
          - Scraping
          - SelectorPacks
          - SignIn
          - Hooks
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethansk.macos-widgets-stats-from-website.widget
        INFOPLIST_FILE: MacosWidgetsStatsFromWebsite/Apps/WidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacosWidgetsStatsFromWebsite/Apps/WidgetExtension/MacosWidgetsStatsFromWebsiteWidget.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) WIDGET_EXTENSION"
        SKIP_INSTALL: YES
      configs:
        # Same archive-then-resign pattern as the main app — see that
        # block's comment for the rationale. The widget extension's
        # sandbox-enabled entitlements are applied by scripts/sign-release.sh
        # during the post-archive deep-sign walk (NOT the same entitlements
        # as the outer .app). v0.21.22, voice 4002 / MBP-CC bridge
        # msg-65036391.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: T34G959ZG8
    info:
      path: MacosWidgetsStatsFromWebsite/Apps/WidgetExtension/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: Stats Widget from Website Widget
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        # v0.21.36 (voice 4189) — same rationale as the main app
        # CFBundleName override above. Some macOS widget-picker
        # surfaces read the appex's CFBundleName directly (rather than
        # CFBundleDisplayName) so we set both to user-facing strings.
        # $(PRODUCT_NAME) here was `MacosWidgetsStatsFromWebsiteWidget`
        # — internal-only, never meant to be user-visible.
        CFBundleName: Stats Widget from Website Widget
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: MacosWidgetsStatsFromWebsite/Apps/WidgetExtension/MacosWidgetsStatsFromWebsiteWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - T34G959ZG8.group.com.ethansk.macos-widgets-stats-from-website

  MacosWidgetsStatsFromWebsiteCLI:
    type: tool
    platform: macOS
    deploymentTarget: "13.0"
    productName: macos-widgets-stats-from-website
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups:
          enabled: 1
    sources:
      - path: MacosWidgetsStatsFromWebsite/Apps/CLI
      - path: MacosWidgetsStatsFromWebsite/Shared
    settings:
      base:
        PRODUCT_NAME: macos-widgets-stats-from-website
        PRODUCT_BUNDLE_IDENTIFIER: com.ethansk.macos-widgets-stats-from-website.cli
        INFOPLIST_FILE: MacosWidgetsStatsFromWebsite/Apps/CLI/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacosWidgetsStatsFromWebsite/Apps/CLI/MacosWidgetsStatsFromWebsiteCLI.entitlements
        # Embed the Info.plist as a __TEXT,__info_plist section so the CLI
        # tool can read CFBundleShortVersionString via Bundle.main.infoDictionary
        # at runtime (single source of truth — see AGENTS.md).
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
    info:
      path: MacosWidgetsStatsFromWebsite/Apps/CLI/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
    entitlements:
      path: MacosWidgetsStatsFromWebsite/Apps/CLI/MacosWidgetsStatsFromWebsiteCLI.entitlements
      properties:
        # CLI also spawns bundled Chromium. App Sandbox propagates to the
        # spawned child and causes it to SIGABRT during early init — same
        # reason as the main app. See MacosWidgetsStatsFromWebsite.entitlements
        # for the full investigation.
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - T34G959ZG8.group.com.ethansk.macos-widgets-stats-from-website
        # Hard-coded team prefix instead of $(AppIdentifierPrefix); see
        # MacosWidgetsStatsFromWebsite.entitlements for why $(AppIdentifierPrefix)
        # silently fails to substitute in Debug builds without a resolved
        # provisioning profile, triggering RunningBoard error 5.
        keychain-access-groups:
          - T34G959ZG8.com.ethansk.macos-widgets-stats-from-website

  # Hook-system unit tests (v0.18.0+). Lightweight XCTest target — pulls
  # in only the Shared/ sources it needs (Models + AppGroup + Hooks),
  # not the MainApp's SwiftUI surface, so the tests stay fast and have
  # no UI side effects. The test launcher replaces the production
  # HookProcessLauncher with a fake so the suite never opens Terminal
  # windows or shells out to claude.
  MacosWidgetsStatsFromWebsiteHookTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    productName: MacosWidgetsStatsFromWebsiteHookTests
    sources:
      - path: MacosWidgetsStatsFromWebsiteTests
      - path: MacosWidgetsStatsFromWebsite/Shared
        excludes:
          - MCP
          - Scraping
          - SelectorPacks
          - SignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethansk.macos-widgets-stats-from-website.hook-tests
        INFOPLIST_FILE: MacosWidgetsStatsFromWebsiteTests/Info.plist
        # Hook tests run on a temp-dir App Group container override so
        # they don't read or write the user's real config. AppGroupStore
        # honours MACOS_WIDGETS_STATS_TEST_CONTAINER via AppGroupPaths.
        CODE_SIGN_STYLE: Automatic
        # Tests build the same Shared/ code the app uses, so they need
        # the AppGroup entitlement to even compile cleanly (otherwise
        # Bundle.main paths resolve oddly). Sandbox stays off so the
        # spawned hook processes in the integration test can actually
        # exec /bin/bash.
        CODE_SIGN_ENTITLEMENTS: MacosWidgetsStatsFromWebsiteTests/Tests.entitlements
        GENERATE_INFOPLIST_FILE: NO

schemes:
  MacosWidgetsStatsFromWebsite:
    build:
      targets:
        MacosWidgetsStatsFromWebsite: all
    run:
      config: Debug
    archive:
      config: Release

  MacosWidgetsStatsFromWebsiteWidget:
    build:
      targets:
        MacosWidgetsStatsFromWebsiteWidget: all
    run:
      config: Debug
    archive:
      config: Release

  MacosWidgetsStatsFromWebsiteCLI:
    build:
      targets:
        MacosWidgetsStatsFromWebsiteCLI: all
    run:
      config: Debug
    archive:
      config: Release

  MacosWidgetsStatsFromWebsiteHookTests:
    build:
      targets:
        MacosWidgetsStatsFromWebsiteHookTests: all
    test:
      config: Debug
      targets:
        - MacosWidgetsStatsFromWebsiteHookTests
